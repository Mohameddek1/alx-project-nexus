name: Markdown Lint

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  markdown:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install markdownlint
        run: |
          pip install markdownlint
      - name: Run markdownlint
        run: |
          markdownlint README.md
